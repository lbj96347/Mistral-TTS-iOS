name: VoxtralTTS
options:
  bundleIdPrefix: com.voxtral
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.21.0"
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: "0.1.12"

targets:
  VoxtralTTS:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: VoxtralTTS/Sources
    resources:
      - path: VoxtralTTS/Resources
    info:
      path: VoxtralTTS/Info.plist
    entitlements:
      path: VoxtralTTS/VoxtralTTS.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voxtral.tts
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: false
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift
        product: MLXFast
      - package: mlx-swift
        product: MLXNN
      - package: mlx-swift
        product: MLXRandom
      - package: swift-transformers
        product: Transformers
